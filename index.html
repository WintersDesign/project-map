<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexGen Project Experience Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1b2a; color: #e0e0e0; }

/* Header */
.header {
  background: linear-gradient(135deg, #0d1b2a 0%, #1b2d4a 100%);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid #0faecd;
  z-index: 1000;
  position: relative;
}
.logo-area { display: flex; align-items: center; }
.logo-area img { height: 60px; object-fit: contain; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 24px; align-items: center;
}
.stat-item { text-align: center; }
.stat-value { font-size: 22px; font-weight: 700; color: #0faecd; }
.stat-label { font-size: 11px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px; }

/* Layout */
.main-container { display: flex; height: calc(100vh - 80px); }

/* Sidebar */
.sidebar {
  width: 300px; min-width: 300px;
  background: #0f1f33;
  border-right: 1px solid #1a3050;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px;
  background: #132840;
  border-bottom: 1px solid #1a3050;
  font-size: 14px; font-weight: 600; color: #0faecd;
  text-transform: uppercase; letter-spacing: 1px;
}
.filter-section { padding: 12px 16px; border-bottom: 1px solid #1a3050; }
.filter-label { font-size: 11px; color: #8899aa; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
.filter-select {
  width: 100%; padding: 8px 10px;
  background: #1a3050; color: #e0e0e0;
  border: 1px solid #2a4060; border-radius: 6px;
  font-size: 13px; cursor: pointer;
}
.filter-select:focus { outline: none; border-color: #0faecd; }

.search-input {
  width: 100%; padding: 8px 10px;
  background: #1a3050; color: #e0e0e0;
  border: 1px solid #2a4060; border-radius: 6px;
  font-size: 13px;
}
.search-input::placeholder { color: #556677; }
.search-input:focus { outline: none; border-color: #0faecd; }

/* Legend */
.legend { padding: 12px 16px; border-bottom: 1px solid #1a3050; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* Project list */
.project-list { flex: 1; overflow-y: auto; padding: 8px; }
.project-list::-webkit-scrollbar { width: 6px; }
.project-list::-webkit-scrollbar-track { background: #0f1f33; }
.project-list::-webkit-scrollbar-thumb { background: #2a4060; border-radius: 3px; }
.project-card {
  background: #101e30; border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px;
  border: 1px solid #1a3050;
  cursor: pointer; transition: all 0.25s ease;
  font-size: 12px;
  position: relative;
  overflow: hidden;
}
.project-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 10px 0 0 10px;
}
.project-card:hover { background: #162a44; transform: translateX(3px); border-color: #2a4a6a; }
.project-card.status-complete::before { background: linear-gradient(180deg, #2ecc71, #27ae60); }
.project-card.status-in-progress::before { background: linear-gradient(180deg, #f39c12, #e67e22); }
.project-card.status-not-under-tsa::before { background: linear-gradient(180deg, #3498db, #2980b9); }
.project-card.status-complete:hover { border-color: rgba(46,204,113,0.3); box-shadow: 0 2px 12px rgba(46,204,113,0.1); }
.project-card.status-in-progress:hover { border-color: rgba(243,156,18,0.3); box-shadow: 0 2px 12px rgba(243,156,18,0.1); }
.project-card.status-not-under-tsa:hover { border-color: rgba(52,152,219,0.3); box-shadow: 0 2px 12px rgba(52,152,219,0.1); }
.project-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.project-card-name { font-weight: 600; color: #fff; font-size: 13px; }
.project-card-badge {
  font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 10px;
}
.status-complete .project-card-badge { background: rgba(46,204,113,0.15); color: #2ecc71; }
.status-in-progress .project-card-badge { background: rgba(243,156,18,0.15); color: #f39c12; }
.status-not-under-tsa .project-card-badge { background: rgba(52,152,219,0.15); color: #3498db; }
.project-card-customer { color: #8899aa; font-size: 11px; margin-bottom: 6px; }
.project-card-meta { display: flex; align-items: center; gap: 12px; color: #556b80; font-size: 11px; }
.project-card-meta svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.6; }
.project-card-meta-item { display: flex; align-items: center; gap: 4px; }

/* Map */
#map { flex: 1; background: #0d1b2a; }

/* Leaflet popup override */
.leaflet-popup-content-wrapper {
  background: #132840 !important;
  color: #e0e0e0 !important;
  border-radius: 10px !important;
  border: 1px solid #0faecd !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
}
.leaflet-popup-tip { background: #132840 !important; }
.leaflet-popup-close-button { color: #8899aa !important; }
.popup-title { font-size: 15px; font-weight: 700; color: #0faecd; margin-bottom: 6px; }
.popup-customer { font-size: 13px; color: #aabbcc; margin-bottom: 8px; }
.popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.popup-label { font-size: 11px; color: #667788; text-transform: uppercase; }
.popup-value { font-size: 13px; color: #e0e0e0; font-weight: 500; }
.popup-status {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; margin-top: 4px;
}
.popup-status.complete { background: rgba(46,204,113,0.2); color: #2ecc71; }
.popup-status.in-progress { background: rgba(243,156,18,0.2); color: #f39c12; }

/* Cluster overrides */
.marker-cluster-small { background-color: rgba(15,174,205,0.3) !important; }
.marker-cluster-small div { background-color: rgba(15,174,205,0.7) !important; color: #fff !important; }
.marker-cluster-medium { background-color: rgba(15,174,205,0.4) !important; }
.marker-cluster-medium div { background-color: rgba(15,174,205,0.8) !important; color: #fff !important; }
.marker-cluster-large { background-color: rgba(15,174,205,0.5) !important; }
.marker-cluster-large div { background-color: rgba(15,174,205,0.9) !important; color: #fff !important; }

/* Toggle sidebar on mobile */
.sidebar-toggle {
  display: none; position: absolute; top: 90px; left: 10px;
  z-index: 1000; background: #132840; color: #0faecd;
  border: 1px solid #0faecd; border-radius: 6px;
  padding: 8px 12px; cursor: pointer; font-size: 14px;
}
@media (max-width: 768px) {
  .sidebar { position: absolute; z-index: 999; left: -300px; transition: left 0.3s; height: calc(100vh - 80px); }
  .sidebar.open { left: 0; }
  .sidebar-toggle { display: block; }
  .stats-bar { display: none; }
}
</style>
</head>

<div class="header">
  <div class="logo-area">
    <img src="flexgen-logo.png" alt="FlexGen - Project Experience Map">
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776; Filters</button>

<div class="main-container">
  <div class="sidebar">
    <div class="sidebar-header">Filters &amp; Projects</div>
    <div class="filter-section">

      <input type="text" class="search-input" id="searchInput" placeholder="Project, customer, city...">
    </div>
    <div class="filter-section">
      <div class="filter-label">Status</div>
      <select class="filter-select" id="filterStatus">

        <option value="Complete">Complete</option>
        <option value="In Progress">In Progress</option>
      </select>
    </div>
    <div class="filter-section">
      <div class="filter-label">State / Region</div>
      <select class="filter-select" id="filterState"><option value="all">All States</option></select>
    </div>
    <div class="filter-section">
      <div class="filter-label">Contract Type</div>
      <select class="filter-select" id="filterContract"><option value="all">All Types</option></select>
    </div>
    <div class="filter-section">
      <div class="filter-label">ISO / Market</div>
      <select class="filter-select" id="filterISO"><option value="all">All ISOs</option></select>
    </div>
    <div class="legend">
      <div class="filter-label">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Complete</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> In Progress</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div> Not Under TSA</div>
    </div>
    <div class="sidebar-header" style="font-size:12px">Projects (<span id="projectCount">0</span>)</div>
    <div class="project-list" id="projectList"></div>
  </div>
  <div id="map"></div>
</div>

// ── Resolve coordinates ──
PROJECTS.forEach(p => {
  const keys = [
    p.city+","+p.state,
    p.city+",International",
    p.state ? p.city+","+p.state : null
  ];
  for (const k of keys) {
    if (k && GEO[k]) { p.lat = GEO[k][0]; p.lng = GEO[k][1]; return; }
  }
  // fallback: state center approximations
  const STATE_CENTER = {
    "Iowa":[42.0,-93.5],"Idaho":[44.0,-114.7],"Arizona":[34.0,-111.1],
    "Virginia":[37.4,-79.5],"International":[48.0,10.0]
  };
  if (STATE_CENTER[p.state]) { p.lat = STATE_CENTER[p.state][0]; p.lng = STATE_CENTER[p.state][1]; }
});

// add jitter so stacked markers separate
const seen = {};
PROJECTS.forEach(p => {
  if (!p.lat) return;
  const key = p.lat.toFixed(3)+","+p.lng.toFixed(3);
  if (seen[key]) {
    p.lat += (Math.random()-0.5)*0.04;
    p.lng += (Math.random()-0.5)*0.04;
  }
  seen[key] = true;
});

// ── Init map ──
const map = L.map('map',{zoomControl:false}).setView([37,-97],5);
L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 45,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();
    let size = count < 10 ? 'small' : count < 30 ? 'medium' : 'large';
    return L.divIcon({ html:'<div>'+count+'</div>', className:'marker-cluster marker-cluster-'+size, iconSize: L.point(40,40) });
  }
});

function statusColor(s) {
  if (s === 'Complete') return '#2ecc71';
  if (s === 'In Progress') return '#f39c12';
  return '#3498db';
}

function createIcon(status, mwh) {
  const color = statusColor(status);
  const r = Math.max(6, Math.min(18, 6 + Math.sqrt(mwh||0)*0.4));
  return L.divIcon({
    className:'',
    html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.6);opacity:0.85;box-shadow:0 0 8px ${color}80;"></div>`,
    iconSize:[r*2,r*2], iconAnchor:[r,r]
  });
}

const markers = [];
PROJECTS.forEach(p => {
  if (!p.lat) return;
  const m = L.marker([p.lat, p.lng], { icon: createIcon(p.status, p.mwh) });
  m.bindPopup(`
    <div class="popup-title">${p.name}</div>
    <div class="popup-customer">${p.customer}</div>
    <div class="popup-grid">
      <div><div class="popup-label">Location</div><div class="popup-value">${p.city}, ${p.state}</div></div>
      <div><div class="popup-label">Contract</div><div class="popup-value">${p.type}</div></div>
      <div><div class="popup-label">MW at POI</div><div class="popup-value">${p.mw}</div></div>
      <div><div class="popup-label">MWh at POI</div><div class="popup-value">${p.mwh}</div></div>
      <div><div class="popup-label">ISO</div><div class="popup-value">${p.iso}</div></div>
      <div><div class="popup-label">BESS</div><div class="popup-value">${p.bess}</div></div>
      <div><div class="popup-label">COD</div><div class="popup-value">${p.cod}</div></div>
      <div><div class="popup-label">Year</div><div class="popup-value">${p.year}</div></div>
    </div>
    <div style="margin-top:8px"><span class="popup-status ${p.status==='Complete'?'complete':'in-progress'}">${p.status}</span></div>
  `, {maxWidth:320, minWidth:240});
  m.projectData = p;
  markers.push(m);
});

// ── Populate filters ──
function unique(arr) { return [...new Set(arr)].filter(Boolean).sort(); }
const states = unique(PROJECTS.map(p=>p.state));
const types = unique(PROJECTS.map(p=>p.type));
const isos = unique(PROJECTS.map(p=>p.iso));

const stateSelect = document.getElementById('filterState');
states.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=s; stateSelect.appendChild(o); });
const contractSelect = document.getElementById('filterContract');
types.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent=t; contractSelect.appendChild(o); });
const isoSelect = document.getElementById('filterISO');
isos.forEach(i => { const o = document.createElement('option'); o.value=i; o.textContent=i; isoSelect.appendChild(o); });

// ── Filter logic ──
function applyFilters() {
  const status = document.getElementById('filterStatus').value;
  const state = stateSelect.value;
  const type = contractSelect.value;
  const iso = isoSelect.value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  clusterGroup.clearLayers();
  const list = document.getElementById('projectList');
  list.innerHTML = '';

  let totalMW = 0, totalMWh = 0, count = 0;

  markers.forEach(m => {
    const p = m.projectData;
    if (status !== 'all' && p.status !== status) return;
    if (state !== 'all' && p.state !== state) return;
    if (type !== 'all' && p.type !== type) return;
    if (iso !== 'all' && p.iso !== iso) return;
    if (search && !(p.name.toLowerCase().includes(search) || p.customer.toLowerCase().includes(search) || p.city.toLowerCase().includes(search) || p.state.toLowerCase().includes(search))) return;

    clusterGroup.addLayer(m);
    count++;
    totalMW += (p.mw || 0);
    totalMWh += (p.mwh || 0);

    const card = document.createElement('div');
    const statusClass = p.status === 'Complete' ? 'complete' : p.status === 'Not Under TSA' ? 'not-under-tsa' : 'in-progress';
    const statusLabel = p.status === 'Complete' ? 'Complete' : p.status === 'Not Under TSA' ? 'Not Under TSA' : 'In Progress';
    card.className = 'project-card status-' + statusClass;
    card.innerHTML = `
      <div class="project-card-header">
        <div class="project-card-name">${p.name}</div>
        <span class="project-card-badge">${statusLabel}</span>
      </div>
      <div class="project-card-customer">${p.customer}</div>
      <div class="project-card-meta">
        <span class="project-card-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${p.city}, ${p.state}</span>
        <span class="project-card-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>${p.mw} MW / ${p.mwh} MWh</span>
      </div>
    `;
    card.addEventListener('click', () => {
      map.setView([p.lat, p.lng], 12);
      m.openPopup();
    });
    list.appendChild(card);
  });

  document.getElementById('projectCount').textContent = count;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-value">${count}</div><div class="stat-label">Projects</div></div>
    <div class="stat-item"><div class="stat-value">${(totalMW/1000).toFixed(1)} GW</div><div class="stat-label">Total MW</div></div>
    <div class="stat-item"><div class="stat-value">${(totalMWh/1000).toFixed(1)} GWh</div><div class="stat-label">Total MWh</div></div>
    <div class="stat-item"><div class="stat-value">${unique(markers.filter(m2=>clusterGroup.hasLayer(m2)).map(m2=>m2.projectData.state)).length}</div><div class="stat-label">States/Regions</div></div>
  `;
}

map.addLayer(clusterGroup);
applyFilters();

// Event listeners
['filterStatus','filterState','filterContract','filterISO'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('searchInput').addEventListener('input', applyFilters);
</script>
